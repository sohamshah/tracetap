<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gemini-trace-__GEMINI_TITLE__</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg-elev: #171a23;
      --bg-elev2: #1f2330;
      --border: #2a2f3d;
      --text: #d8dee9;
      --text-dim: #8a93a6;
      --accent: #8ab4f8;
      --accent-2: #7aa2f7;
      --user: #7aa2f7;
      --assistant: #8ab4f8;
      --reasoning: #b48ead;
      --tool: #e0af68;
      --tool-out: #88909e;
      --error: #f7768e;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header h1 .gemini { color: var(--accent); }
    .summary { color: var(--text-dim); font-size: 13px; display: flex; gap: 14px; flex-wrap: wrap; }
    .summary b { color: var(--text); font-weight: 600; }
    .controls { margin-left: auto; display: flex; gap: 8px; }
    button.ctl {
      background: var(--bg-elev2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    button.ctl:hover { border-color: var(--accent); }
    main { padding: 16px 20px 80px; max-width: 1100px; margin: 0 auto; }
    .conv { border: 1px solid var(--border); border-radius: 10px; margin: 12px 0; overflow: hidden; background: var(--bg-elev); }
    .conv-head {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 12px 16px; background: var(--bg-elev2); user-select: none;
    }
    .conv-head .caret { color: var(--text-dim); font-size: 11px; transition: transform .12s; }
    .conv.collapsed .conv-head .caret { transform: rotate(-90deg); }
    .conv.collapsed .conv-body { display: none; }
    .conv-title { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-model { color: var(--accent); font-family: var(--mono); font-size: 12px; }
    .conv-meta { color: var(--text-dim); font-size: 12px; display: flex; gap: 12px; align-items: center; }
    .conv-body { padding: 8px 16px 16px; }
    .section { margin: 10px 0; }
    .section-label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    details > summary { cursor: pointer; color: var(--text-dim); font-size: 13px; padding: 4px 0; }
    details > summary:hover { color: var(--text); }
    .content { white-space: pre-wrap; word-break: break-word; }
    pre.json {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
      white-space: pre-wrap; word-break: break-word; margin: 6px 0;
    }
    .turn { border-left: 3px solid var(--border); padding: 6px 0 6px 12px; margin: 10px 0; }
    .turn-head { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; color: var(--text-dim); }
    .turn.role-user { border-left-color: var(--user); }
    .turn.role-user .turn-head { color: var(--user); }
    .turn.role-model, .turn.role-assistant { border-left-color: var(--assistant); }
    .turn.role-model .turn-head, .turn.role-assistant .turn-head { color: var(--assistant); }
    .turn.kind-reasoning { border-left-color: var(--reasoning); }
    .turn.kind-reasoning .turn-head { color: var(--reasoning); }
    .turn.kind-tool_call { border-left-color: var(--tool); }
    .turn.kind-tool_call .turn-head { color: var(--tool); }
    .turn.kind-tool_output { border-left-color: var(--tool-out); }
    .turn.kind-tool_output .turn-head { color: var(--tool-out); }
    .turn.kind-other { border-left-color: var(--text-dim); }
    .tool-name { font-family: var(--mono); }
    .mono { font-family: var(--mono); font-size: 12.5px; }
    .pill {
      font-family: var(--mono);
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--bg-elev2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .pill.ok { color: var(--accent); border-color: #2e4a6b; }
    .pill.err { color: var(--error); border-color: #5b2e38; }
    .err-msg { color: var(--error); font-family: var(--mono); font-size: 12.5px; white-space: pre-wrap; }
    .tool-list-item { margin: 2px 0; }
    .tool-list-item code { color: var(--tool); font-family: var(--mono); }
    .empty { color: var(--text-dim); padding: 40px; text-align: center; }
    a.raw-link { color: var(--accent-2); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1><span class="gemini">gemini</span>-trace</h1>
    <div class="summary" id="summary"></div>
    <div class="controls">
      <button class="ctl" id="expandAll">Expand all</button>
      <button class="ctl" id="collapseAll">Collapse all</button>
    </div>
  </header>
  <main id="root"></main>

  <script>
    window.__GEMINI_DATA_B64__ = "__GEMINI_DATA__";
  </script>
  <script>
  (function () {
    "use strict";

    function b64ToUtf8(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }

    var data;
    try {
      data = JSON.parse(b64ToUtf8(window.__GEMINI_DATA_B64__));
    } catch (e) {
      data = { rawPairs: [] };
    }
    var pairs = (data && data.rawPairs) || [];

    function esc(s) {
      if (s === null || s === undefined) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function prettyJson(v) {
      try { return JSON.stringify(v, null, 2); } catch (e) { return String(v); }
    }
    function djb2(str) {
      var h = 5381;
      for (var i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
      return (h >>> 0).toString(16);
    }
    function fmtTime(secs) {
      if (!secs) return "";
      try { return new Date(secs * 1000).toLocaleTimeString(); } catch (e) { return ""; }
    }
    function fmtNum(n) {
      if (n === null || n === undefined) return "0";
      return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // ---- Request classification ------------------------------------------
    function isGeminiRequest(pair) {
      var b = pair && pair.request && pair.request.body;
      if (!b || typeof b !== "object") return false;
      // Gemini generateContent requests carry contents[].
      return Array.isArray(b.contents);
    }
    function modelFromUrl(url, body) {
      if (typeof url === "string") {
        var m = url.match(/\/models\/([^:/?]+)/);
        if (m && m[1]) { try { return decodeURIComponent(m[1]); } catch (e) { return m[1]; } }
      }
      if (body && typeof body.model === "string") return body.model.replace(/^models\//, "");
      return "?";
    }

    // ---- Response parsing -------------------------------------------------
    function parseStreamedBody(raw) {
      var trimmed = String(raw).trim();
      if (!trimmed) return [];
      if (trimmed.indexOf("data:") !== -1) {
        var chunks = [];
        var blocks = trimmed.split(/\r?\n\r?\n/);
        for (var i = 0; i < blocks.length; i++) {
          var dataLines = [];
          var lines = blocks[i].split(/\r?\n/);
          for (var j = 0; j < lines.length; j++) {
            if (lines[j].indexOf("data:") === 0) dataLines.push(lines[j].slice(5).replace(/^ /, ""));
          }
          if (!dataLines.length) continue;
          var dataStr = dataLines.join("\n");
          if (dataStr === "[DONE]") continue;
          try { chunks.push(JSON.parse(dataStr)); } catch (e) { /* skip */ }
        }
        if (chunks.length) return chunks;
      }
      try {
        var parsed = JSON.parse(trimmed);
        return Array.isArray(parsed) ? parsed : [parsed];
      } catch (e) { return []; }
    }

    function mergeChunks(chunks) {
      var parts = [];
      var usage = null, model, finishReason, errorMsg = null;
      for (var i = 0; i < chunks.length; i++) {
        var chunk = chunks[i];
        if (!chunk || typeof chunk !== "object") continue;
        if (chunk.error) { errorMsg = chunk.error.message || prettyJson(chunk.error); continue; }
        if (chunk.usageMetadata) usage = chunk.usageMetadata;
        if (typeof chunk.modelVersion === "string") model = chunk.modelVersion;
        var cand = Array.isArray(chunk.candidates) ? chunk.candidates[0] : null;
        if (cand && cand.finishReason) finishReason = cand.finishReason;
        var content = cand && cand.content;
        var cParts = content && Array.isArray(content.parts) ? content.parts : [];
        for (var p = 0; p < cParts.length; p++) {
          var part = cParts[p];
          if (!part || typeof part !== "object") continue;
          var prev = parts[parts.length - 1];
          if (prev && typeof prev.text === "string" && typeof part.text === "string" &&
              !prev.functionCall && !part.functionCall && Boolean(prev.thought) === Boolean(part.thought)) {
            prev.text += part.text;
          } else {
            var copy = {}; for (var k in part) if (Object.prototype.hasOwnProperty.call(part, k)) copy[k] = part[k];
            parts.push(copy);
          }
        }
      }
      return { content: { role: "model", parts: parts }, usage: usage, model: model, finishReason: finishReason, error: errorMsg };
    }

    function parseResponse(pair) {
      var resp = pair && pair.response;
      if (!resp) return { content: { role: "model", parts: [] }, usage: null, status: null, error: "no response (orphaned request)" };
      var status = resp.status_code;
      var chunks = [];
      if (resp.body !== undefined && resp.body !== null) {
        if (Array.isArray(resp.body)) chunks = resp.body;
        else if (typeof resp.body === "object") {
          if (resp.body.error) return { content: { role: "model", parts: [] }, usage: null, status: status, error: resp.body.error.message || prettyJson(resp.body.error) };
          chunks = [resp.body];
        }
      } else if (typeof resp.body_raw === "string" && resp.body_raw.length) {
        chunks = parseStreamedBody(resp.body_raw);
      }
      var merged = mergeChunks(chunks);
      merged.status = status;
      return merged;
    }

    // ---- Part rendering ---------------------------------------------------
    function functionResponseToText(response) {
      if (response === null || response === undefined) return "";
      if (typeof response === "string") return response;
      if (typeof response === "object") {
        if (typeof response.output === "string") return response.output;
        if (typeof response.result === "string") return response.result;
        if (typeof response.content === "string") return response.content;
        if (typeof response.error === "string") return response.error;
      }
      return prettyJson(response);
    }

    function renderPart(part, role) {
      if (!part || typeof part !== "object") {
        return turnHtml("other", "kind-other", "Part", '<pre class="json">' + esc(prettyJson(part)) + "</pre>");
      }
      if (part.functionCall) {
        var fc = part.functionCall;
        var args = fc.args || {};
        var argHtml = '<pre class="json">' + esc(prettyJson(args)) + "</pre>";
        return turnHtml("tool_call", "kind-tool_call", "Tool call → " + '<span class="tool-name">' + esc(fc.name || "tool") + "</span>", argHtml, true);
      }
      if (part.functionResponse) {
        var fr = part.functionResponse;
        var body = '<div class="content">' + esc(functionResponseToText(fr.response)) + "</div>";
        return turnHtml("tool_output", "kind-tool_output", "Tool output ← " + '<span class="tool-name">' + esc(fr.name || "") + "</span>", body, true);
      }
      if (typeof part.text === "string") {
        if (part.thought === true) {
          return turnHtml("reasoning", "kind-reasoning", "Thinking", '<div class="content">' + esc(part.text) + "</div>");
        }
        var rc = role === "model" ? "role-model" : "role-user";
        var label = role === "model" ? "model" : "user";
        return turnHtml(label, rc, label, '<div class="content">' + esc(part.text) + "</div>");
      }
      if (part.inlineData || part.fileData) {
        var mime = (part.inlineData && part.inlineData.mimeType) || (part.fileData && part.fileData.mimeType) || "binary";
        return turnHtml("other", "kind-other", "Inline data", '<div class="content mono">[' + esc(mime) + "]</div>");
      }
      return turnHtml("other", "kind-other", "Part", '<pre class="json">' + esc(prettyJson(part)) + "</pre>", true);
    }

    function turnHtml(role, cls, headLabel, bodyHtml, collapsibleLong) {
      var inner = bodyHtml;
      if (collapsibleLong) {
        var plain = bodyHtml.replace(/<[^>]+>/g, "");
        if (plain.length > 1400) {
          inner = '<details><summary>show ' + fmtNum(plain.length) + ' chars</summary>' + bodyHtml + "</details>";
        }
      }
      return '<div class="turn ' + cls + '"><div class="turn-head">' + headLabel + "</div>" + inner + "</div>";
    }

    function renderContent(content) {
      if (!content || typeof content !== "object") return "";
      var role = content.role === "model" ? "model" : "user";
      var parts = Array.isArray(content.parts) ? content.parts : [];
      return parts.map(function (p) { return renderPart(p, role); }).join("");
    }

    function renderContents(contents) {
      if (!contents || !contents.length) return "";
      return contents.map(renderContent).join("");
    }

    // ---- Usage ------------------------------------------------------------
    function usageBits(u) {
      if (!u) return null;
      var prompt = u.promptTokenCount || 0;
      var candidates = u.candidatesTokenCount || 0;
      var thoughts = u.thoughtsTokenCount || 0;
      var cached = u.cachedContentTokenCount || 0;
      var total = u.totalTokenCount || (prompt + candidates + thoughts);
      return { input: prompt, output: candidates + thoughts, total: total, cached: cached, reasoning: thoughts };
    }
    function sumUsage(a, b) {
      if (!b) return a;
      a.input += b.input; a.output += b.output; a.total += b.total; a.cached += b.cached; a.reasoning += b.reasoning;
      return a;
    }

    // ---- Grouping ---------------------------------------------------------
    function systemText(si) {
      if (si == null) return "";
      if (typeof si === "string") return si;
      if (Array.isArray(si.parts)) return si.parts.filter(function (p) { return p && typeof p.text === "string" && p.thought !== true; }).map(function (p) { return p.text; }).join("\n");
      if (typeof si.text === "string") return si.text;
      return "";
    }
    function firstUserText(contents) {
      if (!Array.isArray(contents)) return "";
      for (var i = 0; i < contents.length; i++) {
        var c = contents[i];
        if (c && c.role !== "model" && Array.isArray(c.parts)) {
          var t = c.parts.filter(function (p) { return p && typeof p.text === "string" && p.thought !== true; }).map(function (p) { return p.text; }).join("\n").trim();
          if (t) return t;
        }
      }
      return "";
    }
    function convKey(pair) {
      var b = pair.request.body || {};
      var model = modelFromUrl(pair.request.url, b);
      var sys = systemText(b.systemInstruction || b.system_instruction);
      var fu = firstUserText(b.contents);
      return djb2(model + "|" + sys + "|" + fu.slice(0, 200));
    }

    // ---- Build view -------------------------------------------------------
    var geminiPairs = [], otherPairs = [];
    for (var i = 0; i < pairs.length; i++) {
      if (isGeminiRequest(pairs[i])) geminiPairs.push(pairs[i]);
      else otherPairs.push(pairs[i]);
    }

    var groups = {}, order = [];
    for (var i = 0; i < geminiPairs.length; i++) {
      var key = convKey(geminiPairs[i]);
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(geminiPairs[i]);
    }

    var totalTokens = { input: 0, output: 0, total: 0, cached: 0, reasoning: 0 };

    function renderConversation(key, idx) {
      var convPairs = groups[key];
      // Pairs are appended chronologically; the last request carries the
      // fullest contents[] (the CLI resends the whole transcript each turn).
      var last = convPairs[convPairs.length - 1];
      var lastReq = last.request.body || {};
      var model = modelFromUrl(last.request.url, lastReq);

      var convUsage = { input: 0, output: 0, total: 0, cached: 0, reasoning: 0 };
      var parsedResponses = convPairs.map(function (p) {
        var r = parseResponse(p);
        var u = usageBits(r.usage);
        if (u) sumUsage(convUsage, u);
        return r;
      });
      sumUsage(totalTokens, { input: convUsage.input, output: convUsage.output, total: convUsage.total, cached: convUsage.cached, reasoning: convUsage.reasoning });

      var lastResp = parsedResponses[parsedResponses.length - 1];

      // Transcript = full history from last request + the final model turn.
      var transcript = (Array.isArray(lastReq.contents) ? lastReq.contents.slice() : []);
      if (lastResp && lastResp.content && lastResp.content.parts && lastResp.content.parts.length) {
        transcript = transcript.concat([lastResp.content]);
      }

      var fu = firstUserText(transcript);
      var title = fu ? fu.split("\n")[0].slice(0, 90) : ("Conversation " + (idx + 1));

      var anyError = parsedResponses.some(function (r) { return r.error; });

      var html = "";
      html += '<div class="conv-head" data-toggle="conv">';
      html += '<span class="caret">▼</span>';
      html += '<span class="conv-title">' + esc(title) + "</span>";
      html += '<span class="conv-model">' + esc(model) + "</span>";
      html += '<span class="conv-meta">';
      html += "<span>" + convPairs.length + " turn" + (convPairs.length === 1 ? "" : "s") + "</span>";
      html += "<span>" + fmtNum(convUsage.total) + " tok</span>";
      if (convUsage.reasoning) html += "<span>" + fmtNum(convUsage.reasoning) + " thinking</span>";
      if (convUsage.cached) html += "<span>" + fmtNum(convUsage.cached) + " cached</span>";
      if (anyError) html += '<span class="pill err">error</span>';
      html += "</span></div>";

      html += '<div class="conv-body">';

      // System instruction
      var sysText = systemText(lastReq.systemInstruction || lastReq.system_instruction);
      if (sysText) {
        html += '<div class="section"><details><summary>System instruction (' + fmtNum(sysText.length) + ' chars)</summary>' +
                '<div class="content">' + esc(sysText) + "</div></details></div>";
      }

      // Tools
      var toolDecls = [];
      if (Array.isArray(lastReq.tools)) {
        lastReq.tools.forEach(function (t) {
          if (t && Array.isArray(t.functionDeclarations)) toolDecls = toolDecls.concat(t.functionDeclarations);
        });
      }
      if (toolDecls.length) {
        var toolsHtml = toolDecls.map(function (t) {
          var nm = t.name || "tool";
          var desc = t.description ? " — " + esc(String(t.description).split("\n")[0].slice(0, 120)) : "";
          return '<div class="tool-list-item"><code>' + esc(nm) + "</code>" + desc + "</div>";
        }).join("");
        html += '<div class="section"><details><summary>Tools (' + toolDecls.length + ")</summary>" + toolsHtml + "</details></div>";
      }

      // Transcript
      html += '<div class="section"><div class="section-label">Transcript</div>';
      html += renderContents(transcript);
      if (lastResp && lastResp.error) {
        html += '<div class="turn kind-other"><div class="turn-head" style="color:var(--error)">Error ' +
                (lastResp.status ? '<span class="pill err">' + esc(lastResp.status) + "</span>" : "") +
                '</div><div class="err-msg">' + esc(lastResp.error) + "</div></div>";
      }
      html += "</div>";

      // Raw pairs
      html += '<div class="section"><details><summary>Raw request/response pairs (' + convPairs.length + ")</summary>";
      for (var p = 0; p < convPairs.length; p++) {
        var pr = parsedResponses[p];
        var statusClass = pr.status && pr.status >= 200 && pr.status < 300 ? "ok" : "err";
        html += '<div style="margin:8px 0;border-top:1px solid var(--border);padding-top:8px">';
        html += '<div style="font-size:12px;color:var(--text-dim)">#' + (p + 1) + " · " +
                esc(convPairs[p].request.method) + " " + esc(convPairs[p].request.url) +
                ' · <span class="pill ' + statusClass + '">' + esc(pr.status === null ? "no response" : pr.status) + "</span>" +
                " · " + esc(fmtTime(convPairs[p].request.timestamp)) + "</div>";
        html += '<details><summary>request body</summary><pre class="json">' + esc(prettyJson(convPairs[p].request.body)) + "</pre></details>";
        if (pr.content && pr.content.parts && pr.content.parts.length) {
          html += '<details><summary>parsed response content</summary><pre class="json">' + esc(prettyJson(pr.content)) + "</pre></details>";
        }
        html += "</div>";
      }
      html += "</details></div>";

      html += "</div>"; // conv-body

      var div = document.createElement("div");
      div.className = "conv";
      div.innerHTML = html;
      return div;
    }

    function renderOther(pair) {
      var div = document.createElement("div");
      div.className = "conv collapsed";
      var status = pair.response ? pair.response.status_code : "—";
      var head = '<div class="conv-head" data-toggle="conv"><span class="caret">▼</span>' +
                 '<span class="conv-title">' + esc(pair.request.method) + " " + esc(pair.request.url) + "</span>" +
                 '<span class="conv-meta"><span class="pill">' + esc(status) + "</span></span></div>";
      var body = '<div class="conv-body"><div class="section">';
      if (pair.request.body) body += '<details><summary>request body</summary><pre class="json">' + esc(prettyJson(pair.request.body)) + "</pre></details>";
      var rb = pair.response && (pair.response.body !== undefined ? pair.response.body : pair.response.body_raw);
      if (rb !== undefined && rb !== null) {
        body += '<details><summary>response body</summary><pre class="json">' + esc(typeof rb === "string" ? rb.slice(0, 20000) : prettyJson(rb)) + "</pre></details>";
      }
      body += "</div></div>";
      div.innerHTML = head + body;
      return div;
    }

    // ---- Mount ------------------------------------------------------------
    var root = document.getElementById("root");
    if (!pairs.length) {
      root.innerHTML = '<div class="empty">No Gemini API calls captured.</div>';
    } else {
      for (var g = 0; g < order.length; g++) {
        root.appendChild(renderConversation(order[g], g));
      }
      if (otherPairs.length) {
        var hdr = document.createElement("div");
        hdr.className = "section-label";
        hdr.style.margin = "24px 0 8px";
        hdr.textContent = "Other requests (" + otherPairs.length + ")";
        root.appendChild(hdr);
        for (var o = 0; o < otherPairs.length; o++) root.appendChild(renderOther(otherPairs[o]));
      }
    }

    // Summary bar
    var summary = document.getElementById("summary");
    summary.innerHTML =
      "<span><b>" + geminiPairs.length + "</b> API call" + (geminiPairs.length === 1 ? "" : "s") + "</span>" +
      "<span><b>" + order.length + "</b> conversation" + (order.length === 1 ? "" : "s") + "</span>" +
      "<span><b>" + fmtNum(totalTokens.total) + "</b> tokens</span>" +
      (totalTokens.reasoning ? "<span><b>" + fmtNum(totalTokens.reasoning) + "</b> thinking</span>" : "") +
      (data.timestamp ? '<span style="color:var(--text-dim)">' + esc(data.timestamp) + "</span>" : "");

    // Toggle handlers (event delegation)
    document.addEventListener("click", function (e) {
      var head = e.target.closest && e.target.closest('[data-toggle="conv"]');
      if (head && !e.target.closest("details")) {
        head.parentElement.classList.toggle("collapsed");
      }
    });
    document.getElementById("expandAll").addEventListener("click", function () {
      document.querySelectorAll(".conv").forEach(function (c) { c.classList.remove("collapsed"); });
    });
    document.getElementById("collapseAll").addEventListener("click", function () {
      document.querySelectorAll(".conv").forEach(function (c) { c.classList.add("collapsed"); });
    });
  })();
  </script>
</body>
</html>
